services:
  app:
    build:
      context: .
    image: investday-dev
    container_name: investday_app_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Bind mount pour le Hot Reloading
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
    command: npm run dev
    depends_on:
      investday_db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - app-network

  # Renommé en 'investday_db' pour correspondre à ton .env
  investday_db:
    image: postgres:16-alpine
    container_name: investday_db_dev
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db_data_dev:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  app-network:
    driver: bridge